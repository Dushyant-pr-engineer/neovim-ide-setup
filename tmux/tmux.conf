# Prefix: Ctrl-a instead of Ctrl-b
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# True color
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm-ghostty:RGB"

set -g mouse on
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 0

# Splits that keep your current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Jump straight to a pane by its number (matches the index shown in each
# pane's border label) — Alt/Option instead of Ctrl, since Ctrl+digit is more
# likely to be claimed by something running inside a pane (shell, vim, etc).
bind -n M-1 select-pane -t 1
bind -n M-2 select-pane -t 2
bind -n M-3 select-pane -t 3
bind -n M-4 select-pane -t 4
bind -n M-5 select-pane -t 5

# Reload config in place
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Make the focused pane's border easy to spot at a glance
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour226,bold"
set -g pane-border-lines heavy

# Shared borders only show one line, so color alone can be ambiguous about
# which pane it belongs to — label each pane's border with its status instead.
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[reverse bold] ACTIVE #[noreverse],#[fg=colour238] #{pane_index} }"

# --- Claude Code: required inside tmux ---
# Without these, Shift+Enter submits instead of inserting a newline,
# and desktop notifications/progress bars never reach the outer terminal.
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# --- Plugins (installed via TPM: prefix + I) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'   # unifies tmux <-> nvim pane movement

# Session persistence
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM — must stay at the very bottom of the file
run '~/.tmux/plugins/tpm/tpm'
