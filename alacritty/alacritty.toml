# Alacritty alternative to Ghostty (see README — everything else in the
# setup is terminal-agnostic). Font/theme values match the Ghostty config;
# adjust window padding etc. to taste.

[font]
size = 14

[font.normal]
family = "JetBrainsMono Nerd Font"

[window]
padding = { x = 12, y = 12 }
opacity = 0.92
# macOS: make the LEFT Option key send Alt/Meta so Alt-based keys reach the
# app inside tmux (tmux Alt+1..5 pane-nav, Neovim Alt-,/Alt-. buffer cycle).
# Left-only keeps the right Option free for typing accented characters —
# matches Ghostty's `macos-option-as-alt = left`.
option_as_alt = "OnlyLeft"

[colors.primary]
background = "#1a1b26"
foreground = "#c0caf5"

# Required for Shift+Enter to reach Claude Code correctly inside tmux.
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "[13;2u"
